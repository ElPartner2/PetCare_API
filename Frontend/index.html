<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetCare API - Panel de Control</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Barra de Navegación -->
    <header>
        <div class="logo">🐾 PetCare API</div>
        <nav>
            <span id="user-greeting" class="hidden"></span>
            <button id="logout-btn" class="hidden">Cerrar Sesión</button>
        </nav>
    </header>

    <main class="container">
        <!-- SECCIÓN 1: LOGIN (Vista de Invitado) -->
        <section id="login-section" class="card">
            <h2>Iniciar Sesión</h2>
            <p class="slogan">Centralización médica y control preventivo para el bienestar de tus mascotas.</p>
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Correo electrónico:</label>
                    <input type="email" id="email" name="email" required placeholder="correo@ejemplo.com">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" name="password" required placeholder="********">
                </div>
                <button type="submit" class="btn-primary">Ingresar</button>
            </form>
            <p id="login-error" class="error-msg hidden">Credenciales incorrectas. Intenta de nuevo.</p>
        </section>

        <!-- SECCIÓN 2: DASHBOARD (Vista Privada) -->
        <section id="dashboard-section" class="hidden">
            <div class="dashboard-grid">
                
                <!-- Lista de Mascotas -->
                <div class="card">
                    <h3>🐶 Mis Mascotas</h3>
                    <ul id="pets-list" class="list-styled">
                        <!-- Se llena dinámicamente con JS -->
                    </ul>
                </div>

                <!-- Formulario agregar Mascota -->
                <div class="card">
                    <h3>+ Registrar Mascota</h3>
                    <form id="pet-form">
                        <div class="form-group">
                            <label for="pet-name">Nombre:</label>
                            <input type="text" id="pet-name" required>
                        </div>
                        <div class="form-group">
                            <label for="pet-species">Especie:</label>
                            <input type="text" id="pet-species" placeholder="Ej. Perro, Gato" required>
                        </div>
                        <div class="form-group">
                            <label for="pet-breed">Raza (opcional):</label>
                            <input type="text" id="pet-breed" placeholder="Ej. Labrador">
                        </div>
                        <div class="form-group">
                            <label for="pet-birth-date">Fecha de nacimiento:</label>
                            <input type="date" id="pet-birth-date" required>
                        </div>
                        <button type="submit" class="btn-primary">Guardar Mascota</button>
                    </form>
                </div>

            </div>

            <!-- Sección de Historial Médico -->
            <div class="card mt-2">
                <h3>📋 Historial Médico <span id="selected-pet-name"></span></h3>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Fecha</th>
                                <th>Descripción</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="medical-records-table">
                            <tr>
                                <td colspan="3" class="text-center">Selecciona una mascota para ver su historial.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
